name: Process Incoming Docs

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'incoming/**/*.zip'

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      bundle_path:
        description: 'Path to bundle (e.g., incoming/docs-bundle.zip)'
        required: true
        default: 'incoming/docs-bundle.zip'

jobs:
  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    outputs:
      product_name: ${{ steps.validate.outputs.product_name }}
      product_slug: ${{ steps.validate.outputs.product_slug }}
      version: ${{ steps.validate.outputs.version }}
      sha: ${{ steps.validate.outputs.sha }}
      bundle_path: ${{ steps.find.outputs.bundle_path }}

    steps:
      - name: Checkout docs hub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find bundle in PR
        id: find
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUNDLE="${{ github.event.inputs.bundle_path }}"
          else
            # Find zip files changed in this PR
            BUNDLE=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.zip$' | head -1 || true)
          fi

          if [ -z "$BUNDLE" ] || [ ! -f "$BUNDLE" ]; then
            echo "No bundle found in PR changes"
            echo "bundle_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found bundle: $BUNDLE"
          echo "bundle_path=$BUNDLE" >> $GITHUB_OUTPUT
          echo "bundle_found=true" >> $GITHUB_OUTPUT

      - name: Setup Python
        if: steps.find.outputs.bundle_found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate bundle
        id: validate
        if: steps.find.outputs.bundle_found == 'true'
        run: |
          python scripts/ingest_bundle.py "${{ steps.find.outputs.bundle_path }}" --validate-only

  ingest:
    name: Ingest Documentation
    needs: validate
    if: needs.validate.outputs.bundle_path != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout docs hub
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Unpack bundle
        id: unpack
        run: |
          python scripts/ingest_bundle.py "${{ needs.validate.outputs.bundle_path }}" --output-dir site/

      - name: Show extracted structure
        run: |
          echo "📦 Contents extracted to site/"
          find site/ -type f | head -20
          echo ""
          echo "Product: ${{ needs.validate.outputs.product_name }}"
          echo "Version: ${{ needs.validate.outputs.version }}"
          echo "Source:  ${{ needs.validate.outputs.sha }}"

      - name: Smoke test - check index exists
        run: |
          SLUG="${{ needs.validate.outputs.product_slug }}"
          VERSION="${{ needs.validate.outputs.version }}"
          
          # Check manifest was extracted
          if [ ! -f "site/$SLUG/$VERSION/manifest.json" ]; then
            echo "❌ manifest.json not found"
            exit 1
          fi
          
          # Check docs folder exists
          if [ ! -d "site/$SLUG/$VERSION/docs" ]; then
            echo "❌ docs/ folder not found"
            exit 1
          fi
          
          echo "✅ Smoke test passed"
          echo "   - manifest.json: present"
          echo "   - docs/ folder: present"

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ needs.validate.outputs.product_slug }}-${{ needs.validate.outputs.version }}
          path: site/
          retention-days: 7

      - name: Write job summary
        run: |
          SLUG="${{ needs.validate.outputs.product_slug }}"
          VERSION="${{ needs.validate.outputs.version }}"
          SHA="${{ needs.validate.outputs.sha }}"
          PRODUCT="${{ needs.validate.outputs.product_name }}"
          
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 📚 Documentation Ingested
          
          | Field | Value |
          |-------|-------|
          | **Product** | ${PRODUCT} |
          | **Slug** | \`${SLUG}\` |
          | **Version** | \`${VERSION}\` |
          | **Source SHA** | \`${SHA}\` |
          | **Extracted to** | \`site/${SLUG}/${VERSION}/\` |
          
          ## Files Extracted
          \`\`\`
          $(find site/${SLUG}/${VERSION}/ -type f | head -15)
          \`\`\`
          
          ## Next Steps
          - Review extracted docs in the artifact
          - Merge PR to include in site build
          - Docs will be available at \`/{slug}/{version}/\`
          EOF
          retention-days: 7
